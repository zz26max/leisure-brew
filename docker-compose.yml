services:
  # ==================== MySQL ====================
  leisure-brew-mysql:
    image: mysql:8.0
    container_name: leisure-brew-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meal_buddy
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leisure-net

  # ==================== Redis ====================
  leisure-brew-redis:
    image: redis:7-alpine
    container_name: leisure-brew-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - leisure-net

  # ==================== 后端 ====================
  leisure-brew-backend:
    build: ./backend
    image: leisure-brew/backend:latest
    container_name: leisure-brew-backend
    ports:
      - "8080:8080"
    depends_on:
      leisure-brew-mysql:
        condition: service_healthy
      leisure-brew-redis:
        condition: service_started
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: docker
      # 数据源配置
      SKY_DATASOURCE_HOST: leisure-brew-mysql
      SKY_DATASOURCE_PORT: 3306
      SKY_DATASOURCE_DATABASE: meal_buddy
      SKY_DATASOURCE_USERNAME: root
      SKY_DATASOURCE_PASSWORD: root
      # Redis 配置
      SKY_REDIS_LOCALHOST: leisure-brew-redis
      SKY_REDIS_PORT: 6379
      SKY_REDIS_PASSWORD: ""
      SKY_REDIS_DATABASE: 0
      # JWT 配置
      SKY_JWT_ADMIN_SECRET_KEY: your_admin_secret_key
      SKY_JWT_USER_SECRET_KEY: your_user_secret_key
      # 阿里云 OSS（按需填写）
      SKY_ALIOSS_ENDPOINT: ""
      SKY_ALIOSS_ACCESS_KEY_ID: ""
      SKY_ALIOSS_ACCESS_KEY_SECRET: ""
      SKY_ALIOSS_BUCKET_NAME: ""
      # 微信（按需填写，从微信公众平台获取）
      SKY_WECHAT_APPID: ""
      SKY_WECHAT_SECRET: ""
      SKY_WECHAT_MCHID: ""
      SKY_WECHAT_MCHSERIALNO: ""
      SKY_WECHAT_APIV3KEY: ""
      SKY_WECHAT_NOTIFYURL: ""
      SKY_WECHAT_REFUNDNOTIFYURL: ""
    networks:
      - leisure-net

  # ==================== 前端 ====================
  leisure-brew-frontend:
    build: ./frontend
    image: leisure-brew/frontend:latest
    container_name: leisure-brew-frontend
    ports:
      - "80:80"
    depends_on:
      - leisure-brew-backend
    networks:
      - leisure-net

volumes:
  mysql-data:
  redis-data:

networks:
  leisure-net:
    driver: bridge
